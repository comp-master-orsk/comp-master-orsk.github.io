    <style>
        *{margin:0;padding:0;box-sizing:border-box}:root{--bg-light:#f9fafc;--bg-card:#fff;--primary-dark:#0b2b4c;--primary-soft:#1e4a6b;--accent-soft:#e6a020;--accent-light:#fff2db;--text-main:#1e2f3f;--text-secondary:#5b6f82;--border-light:#dee7f2;--shadow-sm:0 4px 12px rgba(0,20,40,0.03);--shadow-hover:0 12px 28px rgba(0,20,40,0.08);--tg-color:#2f9bd8;--success:#1c8b5c;--radius-lg:28px;--radius-md:18px;--radius-sm:12px}body{font-family:'Inter',sans-serif;background:var(--bg-light);color:var(--text-main);line-height:1.5;scroll-behavior:smooth}.container{max-width:1280px;margin:0 auto;padding:0 28px}h1,h2,h3{font-weight:700;color:var(--primary-dark);line-height:1.2}h1{font-size:52px;letter-spacing:-0.02em;margin-bottom:24px}@media (max-width:768px){h1{font-size:40px}}.btn{display:inline-block;padding:14px 34px;border-radius:50px;font-weight:600;font-size:16px;text-decoration:none;transition:all .2s;border:none;cursor:pointer;box-shadow:var(--shadow-sm)}.btn-primary{background:var(--primary-dark);color:#fff}.btn-primary:hover{background:var(--primary-soft);transform:translateY(-2px)}.btn-tg{background:var(--tg-color);color:#fff}.header{background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border-light);position:sticky;top:0;z-index:100;height:85px}.header .container{display:flex;justify-content:space-between;align-items:center;height:100%}.logo-main{font-size:24px;font-weight:800;color:var(--primary-dark);text-decoration:none}.logo-main span{color:var(--accent-soft)}.logo-desc{font-size:13px;color:var(--text-secondary);font-weight:500}.nav-menu{display:flex;gap:40px;align-items:center}.nav-link{color:var(--text-secondary);text-decoration:none;font-weight:600;font-size:15px;transition:color .2s}.nav-link:hover{color:var(--primary-dark)}.phone-header{font-weight:700;color:var(--primary-dark);text-decoration:none;font-size:18px;background:var(--accent-light);padding:8px 18px;border-radius:40px;border:1px solid var(--accent-soft)}.hero{padding:60px 0 80px;background:#fff}.hero .container{display:grid;grid-template-columns:1.2fr 0.8fr;gap:50px;align-items:center}.hero-badge{background:var(--accent-light);color:var(--accent-soft);font-weight:700;padding:6px 16px;border-radius:30px;display:inline-block;font-size:14px;margin-bottom:20px;border:1px solid var(--accent-soft)}.hero-text{font-size:18px;color:var(--text-secondary);margin:24px 0 32px}.hero-actions{display:flex;gap:16px;flex-wrap:wrap;align-items:center}.hero-stats{display:flex;gap:50px;margin-top:45px}.stat-number{font-size:32px;font-weight:800;color:var(--primary-dark);display:block;line-height:1.2}.stat-label{font-size:14px;color:var(--text-secondary);font-weight:500}.hero-image{background:var(--accent-light);border-radius:var(--radius-lg);padding:40px;text-align:center;box-shadow:var(--shadow-sm)}.hero-image i{font-size:180px;color:var(--primary-dark);opacity:.9}@media (max-width:1000px){.hero .container{grid-template-columns:1fr}.nav-menu{display:none}}

margin-bottom:15px}.service-price{font-size:26px;font-weight:800;color:var(--primary-dark)}.service-price small{font-size:15px;font-weight:500;color:var(--text-secondary)}.pricing-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:40px}.price-item{background:#fff;border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:20px;transition:border .2s}.price-item h4{font-size:16px;font-weight:600;color:var(--text-secondary);margin-bottom:6px}.price-item .price{font-size:22px;font-weight:800;color:var(--primary-dark)}.faq-grid{max-width:800px;margin:40px auto 0}.faq-item{background:#fff;border:1px solid var(--border-light);border-radius:var(--radius-sm);margin-bottom:12px;overflow:hidden}.faq-question{padding:20px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .2s}.faq-question:hover{background:var(--accent-light)}.faq-question i{color:var(--accent-soft);transition:transform .2s}.faq-item.active .faq-question i{transform:rotate(45deg)}.faq-answer{padding:0 20px 20px;display:none;color:var(--text-secondary)}.faq-item.active .faq-answer{display:block}.reviews-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:25px;margin-top:40px}.review-item{background:#fff;border:1px solid var(--border-light);border-radius:var(--radius-md);padding:28px;box-shadow:var(--shadow-sm)}.review-header{display:flex;align-items:center;gap:15px;margin-bottom:15px}.review-avatar{width:55px;height:55px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--accent-soft);font-weight:700}.review-name{font-weight:700;font-size:18px}.review-date{font-size:13px;color:var(--text-secondary)}.review-text{color:var(--text-main);margin:15px 0;font-style:italic}.review-rating{color:var(--accent-soft)}.contact-card{background:#fff;border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:56px;display:grid;grid-template-columns:1fr 1fr;gap:50px;box-shadow:var(--shadow-sm)}.contact-item{display:flex;align-items:center;gap:18px;margin:25px 0}.contact-item i{width:56px;height:56px;background:var(--accent-light);border-radius:18px;display:flex;align-items:center;justify-content:center;color:var(--accent-soft);font-size:24px}.contact-item strong{display:block;font-size:20px;font-weight:700}.contact-item span{color:var(--text-secondary)}.contact-form{background:var(--bg-light);padding:40px;border-radius:var(--radius-md)}.form-group{margin-bottom:20px}.form-group input,.form-group textarea{width:100%;padding:16px 18px;background:#fff;border:1px solid var(--border-light);border-radius:var(--radius-sm);font-size:16px;font-family:inherit;transition:.2s}.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--accent-soft);box-shadow:0 0 0 4px var(--accent-light)}.submit-btn{width:100%;padding:16px;background:var(--primary-dark);color:#fff;border:none;border-radius:50px;font-weight:700;cursor:pointer;transition:background .2s}.submit-btn:hover{background:var(--primary-soft)}.benefits{display:flex;justify-content:center;gap:50px;flex-wrap:wrap;padding:40px 0}.benefit-item{display:flex;align-items:center;gap:12px}.benefit-item i{color:var(--success);font-size:28px}.footer{padding:40px 0 20px;border-top:2px solid var(--accent-light);text-align:center;color:var(--text-secondary);background:#fff}.fixed-tg{position:fixed;bottom:25px;right:25px;background:var(--tg-color);color:#fff;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 8px 20px rgba(47,155,216,0.3);z-index:1000;transition:.2s;border:2px solid #fff}.fixed-tg:hover{transform:scale(1.1)}@media (max-width:1000px){.services-grid,.pricing-grid,.reviews-grid,.contact-card,.popular-grid{grid-template-columns:1fr}}
